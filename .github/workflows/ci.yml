name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  serial-gate:
    name: Serial roadmap gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read protected validator from base when present
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          mkdir -p .ci
          if git cat-file -e "${BASE_SHA}:scripts/ci/validate-serial-roadmap.ps1" 2>/dev/null; then
            git show "${BASE_SHA}:scripts/ci/validate-serial-roadmap.ps1" > .ci/validate-serial-roadmap.ps1
          else
            cp scripts/ci/validate-serial-roadmap.ps1 .ci/validate-serial-roadmap.ps1
          fi

      - name: Run validator self-test
        shell: pwsh
        run: ./.ci/validate-serial-roadmap.ps1 -SelfTest

      - name: Read base roadmap when present
        id: base-roadmap
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          mkdir -p .ci
          if git cat-file -e "${BASE_SHA}:.github/serial-roadmap.json" 2>/dev/null; then
            git show "${BASE_SHA}:.github/serial-roadmap.json" > .ci/base-serial-roadmap.json
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate serial transition
        shell: pwsh
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_BRANCH: ${{ github.head_ref }}
          BASE_ROADMAP_PRESENT: ${{ steps.base-roadmap.outputs.present }}
        run: |
          $parameters = @{
            HeadRoadmapPath = '.github/serial-roadmap.json'
            PullRequestBody = $env:PR_BODY
            PullRequestTitle = $env:PR_TITLE
            BranchName = $env:HEAD_BRANCH
          }

          if ($env:BASE_ROADMAP_PRESENT -eq 'true') {
            $parameters.BaseRoadmapPath = '.ci/base-serial-roadmap.json'
          }

          ./.ci/validate-serial-roadmap.ps1 @parameters

  build-and-test:
    name: Build and test
    needs: serial-gate
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Check code formatting
        shell: pwsh
        run: |
          dotnet format TiaAgent.sln --verify-no-changes
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Code formatting violations detected. Run 'dotnet format TiaAgent.sln' locally and commit the fixes."
            exit 1
          }

      - name: Run build and test script
        shell: pwsh
        run: |
          ./build.ps1 build
          ./build.ps1 test

      - name: Validate Add-In package contents
        shell: pwsh
        if: runner.os == 'Windows'
        run: |
          $ErrorActionPreference = "Stop"

          # Check if TIA Portal publisher is available (requires TIA Portal installation)
          $publisher = "C:\Program Files\Siemens\Automation\Portal V21\PublicAPI\V21\Siemens.Engineering.AddIn.Publisher.exe"
          if (-not (Test-Path $publisher)) {
            Write-Host "TIA Portal publisher not available — skipping package validation."
            exit 0
          }

          Write-Host "=== Validating Add-In package ==="

          # Build and package
          ./build.ps1 pack-addin

          # Find the .addin file
          $addin = Get-ChildItem "artifacts" -Filter "TiaAgent-*.addin" | Select-Object -First 1
          if (-not $addin) {
            throw "No .addin file found in artifacts/"
          }
          Write-Host "Package: $($addin.Name)"

          # Inspect OPC package contents
          Add-Type -AssemblyName WindowsBase
          $pkg = [IO.Packaging.Package]::Open($addin.FullName, [IO.FileMode]::Open, [IO.FileAccess]::Read, [IO.FileShare]::Read)
          try {
            $parts = @($pkg.GetParts() | ForEach-Object { $_.Uri.ToString() })

            # Verify required assemblies
            $hasAddIn = $parts | Where-Object { $_ -match 'TIAAGENT\.ADDIN' }
            $hasContracts = $parts | Where-Object { $_ -match 'TIAAGENT\.CONTRACTS' }
            if (-not $hasAddIn) { throw "Package missing TiaAgent.AddIn.dll assembly" }
            if (-not $hasContracts) { throw "Package missing TiaAgent.Contracts.dll assembly" }
            Write-Host "  [OK] Assemblies: TiaAgent.AddIn.dll, TiaAgent.Contracts.dll"

            # Verify required permissions
            $hasUiPermission = $parts | Where-Object { $_ -match 'UIPermission' }
            $hasFileIoPermission = $parts | Where-Object { $_ -match 'FileIOPermission' }
            $hasEnvPermission = $parts | Where-Object { $_ -match 'EnvironmentPermission' }
            $hasSecurityPermission = $parts | Where-Object { $_ -match 'SecurityPermission' }
            $hasTiaPermission = $parts | Where-Object { $_ -match 'TIA\.' }
            if (-not $hasUiPermission) { throw "Package missing UIPermission (required for WPF UI)" }
            if (-not $hasFileIoPermission) { throw "Package missing FileIOPermission (required for logging)" }
            if (-not $hasEnvPermission) { throw "Package missing EnvironmentPermission (required for AddInLogger startup)" }
            if (-not $hasSecurityPermission) { throw "Package missing SecurityPermission (required for WPF Window constructor)" }
            if (-not $hasTiaPermission) { throw "Package missing TIA permission" }
            Write-Host "  [OK] Permissions: UIPermission, FileIOPermission, EnvironmentPermission, SecurityPermission, TIA.ReadWrite"

            # Verify no overly broad permissions
            $hasUnrestricted = $parts | Where-Object { $_ -match 'UnrestrictedAccess' }
            $hasSkipVerification = $parts | Where-Object { $_ -match 'SkipVerification' }
            if ($hasUnrestricted) { throw "Package must not contain UnrestrictedAccess" }
            if ($hasSkipVerification) { throw "Package must not contain SkipVerification permission" }
            Write-Host "  [OK] No overly broad permissions"

            # Verify metadata
            $hasMeta = $parts | Where-Object { $_ -match '/Meta/' }
            $hasVersion = $parts | Where-Object { $_ -match '/EngineeringVersion' }
            if (-not $hasMeta) { throw "Package missing /Meta/ section" }
            if (-not $hasVersion) { throw "Package missing /EngineeringVersion" }
            Write-Host "  [OK] Metadata present"

            # Verify digital signature
            $hasSignature = $parts | Where-Object { $_ -match '/package/services/digital-signature/' }
            if ($hasSignature) {
              Write-Host "  [OK] Digital signature present"
            } else {
              Write-Host "  [WARN] No digital signature (unsigned package)"
            }

            Write-Host ""
            Write-Host "=== Package validation passed ==="
          } finally {
            $pkg.Close()
            $pkg.Dispose()
          }

  codeql-analysis:
    name: CodeQL static analysis
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-extended,security-and-quality

      - name: Build solution for CodeQL analysis
        shell: pwsh
        run: ./build.ps1 build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

